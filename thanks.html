<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Jalish Mahmud Sujon</title>
  <link rel="shortcut icon" href="/images/favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <style>
    .status-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; z-index: 1; position: relative; text-align: center; }
    .status-icon { width: 72px; height: 72px; border-radius: 50%; background: rgba(79,209,197,0.1); border: 1px solid rgba(79,209,197,0.3); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: var(--accent); margin: 0 auto 2rem; }
    .status-title { font-family: var(--font-display); font-size: 3rem; color: var(--text); margin-bottom: 1rem; }
    .status-desc { font-family: var(--font-body); color: var(--muted); font-size: 0.95rem; margin-bottom: 2.5rem; }
    .back-link { display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.8rem 1.8rem; background: var(--accent); color: var(--bg); font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 2px; transition: background 0.2s; }
    .back-link:hover { background: #81e6d9; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="status-page">
    <div class="status-icon"><i class="fa-solid fa-check"></i></div>
    <h1 class="status-title">Message Sent</h1>
    <p class="status-desc">Thanks for reaching out. I'll get back to you as soon as possible.</p>
    <a href="./" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
  </div>
</body>
</html>
